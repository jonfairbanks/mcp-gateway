name: Publish Docker Image

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Determine image tags
        id: meta
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            tag="latest"
          else
            tag="develop"
          fi
          {
            echo "image=${image}"
            echo "tag=${tag}"
          } >> "${GITHUB_OUTPUT}"

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: matrix.platform == 'linux/arm64' && runner.arch != 'ARM64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ needs.meta.outputs.image }}:${{ needs.meta.outputs.tag }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=docker-publish-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-publish-${{ matrix.arch }}

  publish:
    needs:
      - meta
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag "${{ needs.meta.outputs.image }}:${{ needs.meta.outputs.tag }}" \
            "${{ needs.meta.outputs.image }}:${{ needs.meta.outputs.tag }}-amd64" \
            "${{ needs.meta.outputs.image }}:${{ needs.meta.outputs.tag }}-arm64"
