name: PR Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    env:
      MCP_GATEWAY_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mcp_gateway
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mcp_gateway
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mcp_gateway"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint
            command: python -m ruff check .
          - name: Test
            command: python -m pytest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Wait for Postgres
        if: matrix.name == 'Test'
        run: |
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -U postgres -d mcp_gateway && exit 0
            sleep 1
          done
          exit 1

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
