<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">MCP Gateway Architecture</title>
  <desc id="desc">Multi-replica MCP gateway deployment with shared Postgres, metrics, and mixed upstream types.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#55606e"/>
    </marker>
    <style>
      .label { font: 600 15px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .text { font: 400 14px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .small { font: 400 13px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
      .group { fill: #fff9d9; stroke: #d1c36a; stroke-width: 1.5; rx: 18; }
      .client { fill: #e8f3ff; stroke: #7aa9e8; stroke-width: 1.5; rx: 12; }
      .gateway { fill: #fdecec; stroke: #ef6b6b; stroke-width: 2; rx: 14; }
      .store { fill: #f3f4f6; stroke: #9ca3af; stroke-width: 1.5; rx: 14; }
      .upstream { fill: #eef8ee; stroke: #81c784; stroke-width: 1.5; rx: 14; }
      .line { stroke: #55606e; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="group" x="260" y="24" width="680" height="116"/>
  <text class="label" x="600" y="46" text-anchor="middle">MCP Clients</text>
  <rect class="client" x="320" y="62" width="120" height="48"/>
  <rect class="client" x="490" y="62" width="120" height="48"/>
  <rect class="client" x="660" y="62" width="220" height="48"/>
  <text class="text" x="380" y="91" text-anchor="middle">Codex</text>
  <text class="text" x="550" y="91" text-anchor="middle">Claude</text>
  <text class="text" x="770" y="91" text-anchor="middle">Custom MCP Client</text>

  <rect class="client" x="470" y="176" width="260" height="72"/>
  <text class="label" x="600" y="206" text-anchor="middle">Gateway Endpoint</text>
  <text class="text" x="600" y="230" text-anchor="middle">POST /mcp</text>

  <rect class="group" x="80" y="284" width="1040" height="150"/>
  <text class="label" x="600" y="308" text-anchor="middle">MCP Gateway Deployment</text>
  <rect class="gateway" x="300" y="334" width="250" height="70"/>
  <rect class="gateway" x="650" y="334" width="250" height="70"/>
  <text class="label" x="425" y="361" text-anchor="middle">Gateway Replica A</text>
  <text class="small" x="425" y="384" text-anchor="middle">transport + auth + policy + routing</text>
  <text class="label" x="775" y="361" text-anchor="middle">Gateway Replica B</text>
  <text class="small" x="775" y="384" text-anchor="middle">transport + auth + policy + routing</text>

  <rect class="group" x="70" y="484" width="500" height="220"/>
  <text class="label" x="320" y="508" text-anchor="middle">Upstream MCPs</text>
  <rect class="upstream" x="110" y="544" width="180" height="90"/>
  <rect class="upstream" x="350" y="544" width="180" height="90"/>
  <text class="label" x="200" y="572" text-anchor="middle">Local stdio MCPs</text>
  <text class="small" x="200" y="599" text-anchor="middle">Context7 / Notion / Grafana</text>
  <text class="label" x="440" y="572" text-anchor="middle">Remote Streamable HTTP</text>
  <text class="label" x="440" y="590" text-anchor="middle">MCPs</text>
  <text class="small" x="440" y="617" text-anchor="middle">GitHub / vendor MCPs</text>

  <rect class="group" x="630" y="484" width="500" height="220"/>
  <text class="label" x="880" y="508" text-anchor="middle">Shared Services</text>
  <rect class="store" x="665" y="544" width="250" height="100"/>
  <rect class="gateway" x="945" y="544" width="150" height="100"/>
  <text class="label" x="790" y="574" text-anchor="middle">Shared Postgres</text>
  <text class="small" x="790" y="602" text-anchor="middle">audit + cache + auth/RBAC</text>
  <text class="small" x="790" y="624" text-anchor="middle">+ shared rate limits</text>
  <text class="label" x="1020" y="582" text-anchor="middle">Prometheus Metrics</text>
  <text class="text" x="1020" y="606" text-anchor="middle">GET /metrics</text>

  <path class="line" d="M380 110 C380 140, 520 140, 520 176"/>
  <path class="line" d="M550 110 C550 140, 570 140, 570 176"/>
  <path class="line" d="M770 110 C770 140, 680 140, 680 176"/>

  <path class="line" d="M540 248 C540 286, 425 302, 425 334"/>
  <path class="line" d="M660 248 C660 286, 775 302, 775 334"/>

  <path class="line" d="M350 404 C320 454, 230 484, 200 544"/>
  <path class="line" d="M470 404 C470 464, 450 484, 440 544"/>
  <path class="line" d="M500 404 C560 454, 730 484, 790 544"/>
  <path class="line" d="M530 404 C650 454, 950 484, 1020 544"/>

  <path class="line" d="M670 404 C620 454, 260 484, 200 544"/>
  <path class="line" d="M700 404 C640 464, 460 484, 440 544"/>
  <path class="line" d="M760 404 C760 464, 780 484, 790 544"/>
  <path class="line" d="M850 404 C900 454, 1000 484, 1020 544"/>
</svg>
