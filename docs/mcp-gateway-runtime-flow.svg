<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1400 960" role="img" aria-labelledby="title desc">
  <title id="title">MCP Gateway Runtime Flow</title>
  <desc id="desc">Request flow through MCP gateway from client, through transport and gateway core, to discovery, execution, cache, Postgres, metrics, and upstreams.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#55606e"/>
    </marker>
    <style>
      .label { font: 600 15px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .text { font: 400 14px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .small { font: 400 13px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
      .client { fill: #e8f3ff; stroke: #7aa9e8; stroke-width: 1.5; rx: 12; }
      .gateway { fill: #fdecec; stroke: #ef6b6b; stroke-width: 2; rx: 14; }
      .store { fill: #f3f4f6; stroke: #9ca3af; stroke-width: 1.5; rx: 14; }
      .upstream { fill: #eef8ee; stroke: #81c784; stroke-width: 1.5; rx: 14; }
      .line { stroke: #55606e; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke: #6b7280; stroke-width: 2; fill: none; stroke-dasharray: 5 5; marker-end: url(#arrow); }
      .pill { fill: #ececec; rx: 8; }
    </style>
  </defs>

  <rect class="client" x="540" y="30" width="320" height="86"/>
  <text class="label" x="700" y="60" text-anchor="middle">Client</text>
  <text class="text" x="700" y="87" text-anchor="middle">Codex / Claude / other</text>
  <text class="text" x="700" y="108" text-anchor="middle">MCP client</text>

  <rect class="gateway" x="530" y="200" width="340" height="98"/>
  <text class="label" x="700" y="232" text-anchor="middle">MCP HTTP Endpoint</text>
  <text class="text" x="700" y="257" text-anchor="middle">POST /mcp</text>
  <text class="small" x="700" y="280" text-anchor="middle">auth + protocol validation + rate limit</text>

  <rect class="gateway" x="530" y="410" width="340" height="112"/>
  <text class="label" x="700" y="444" text-anchor="middle">Gateway Core</text>
  <text class="text" x="700" y="470" text-anchor="middle">batch handling, routing,</text>
  <text class="text" x="700" y="492" text-anchor="middle">deny policy, cache, audit</text>

  <rect class="gateway" x="80" y="610" width="250" height="104"/>
  <text class="label" x="205" y="642" text-anchor="middle">Discovery Fan-out</text>
  <text class="text" x="205" y="668" text-anchor="middle">initialize, tools/list,</text>
  <text class="text" x="205" y="690" text-anchor="middle">resources/list, prompts/list</text>

  <rect class="gateway" x="390" y="610" width="250" height="104"/>
  <text class="label" x="515" y="642" text-anchor="middle">Targeted Execution</text>
  <text class="text" x="515" y="668" text-anchor="middle">tools/call routed to one</text>
  <text class="text" x="515" y="690" text-anchor="middle">upstream</text>

  <rect class="store" x="760" y="610" width="270" height="104"/>
  <text class="label" x="895" y="642" text-anchor="middle">Shared Postgres</text>
  <text class="text" x="895" y="668" text-anchor="middle">audit + cache + auth/RBAC</text>
  <text class="text" x="895" y="690" text-anchor="middle">+ shared rate limits</text>

  <rect class="store" x="1080" y="610" width="210" height="104"/>
  <text class="label" x="1185" y="646" text-anchor="middle">Prometheus Metrics</text>
  <text class="text" x="1185" y="672" text-anchor="middle">served at /metrics</text>

  <rect class="upstream" x="430" y="810" width="300" height="96"/>
  <text class="label" x="580" y="844" text-anchor="middle">Upstream MCPs</text>
  <text class="text" x="580" y="872" text-anchor="middle">stdio and streamable_http</text>

  <rect class="gateway" x="1060" y="810" width="220" height="96"/>
  <text class="label" x="1170" y="844" text-anchor="middle">Cache Hit</text>
  <text class="text" x="1170" y="872" text-anchor="middle">return cached tool result</text>

  <path class="line" d="M650 116 C650 150, 650 166, 650 200"/>
  <path class="dashed" d="M770 200 C770 160, 770 148, 770 116"/>
  <path class="line" d="M650 298 C650 344, 650 362, 650 410"/>
  <path class="dashed" d="M770 410 C770 374, 770 340, 770 298"/>

  <path class="line" d="M620 522 C480 560, 300 574, 205 610"/>
  <path class="line" d="M680 522 C610 560, 545 572, 515 610"/>
  <path class="line" d="M760 522 C835 560, 880 572, 895 610"/>
  <path class="line" d="M800 522 C955 552, 1125 572, 1185 610"/>
  <path class="line" d="M780 522 C930 580, 1075 700, 1170 810"/>

  <path class="line" d="M205 714 C205 764, 430 776, 530 810"/>
  <path class="line" d="M515 714 C515 762, 580 776, 580 810"/>
  <path class="line" d="M580 810 C580 736, 660 698, 660 522"/>
  <rect class="pill" x="614" y="146" width="72" height="26"/><text class="small" x="650" y="164" text-anchor="middle">POST /mcp</text>
  <rect class="pill" x="735" y="146" width="70" height="26"/><text class="small" x="770" y="164" text-anchor="middle">response</text>
  <rect class="pill" x="686" y="334" width="168" height="26"/><text class="small" x="770" y="352" text-anchor="middle">JSON-RPC response</text>
  <rect class="pill" x="292" y="548" width="126" height="26"/><text class="small" x="355" y="566" text-anchor="middle">discovery methods</text>
  <rect class="pill" x="556" y="548" width="82" height="26"/><text class="small" x="597" y="566" text-anchor="middle">tools/call</text>
  <rect class="pill" x="811" y="554" width="168" height="26"/><text class="small" x="895" y="572" text-anchor="middle">persist audit + cache</text>
  <rect class="pill" x="843" y="576" width="104" height="24"/><text class="small" x="895" y="593" text-anchor="middle">+ auth state</text>
  <rect class="pill" x="1098" y="568" width="112" height="26"/><text class="small" x="1154" y="586" text-anchor="middle">update counters</text>
  <rect class="pill" x="500" y="738" width="90" height="26"/><text class="small" x="545" y="756" text-anchor="middle">cache miss</text>
  <rect class="pill" x="1097" y="738" width="80" height="26"/><text class="small" x="1137" y="756" text-anchor="middle">cache hit</text>
  <rect class="pill" x="602" y="644" width="110" height="26"/><text class="small" x="657" y="662" text-anchor="middle">JSON-RPC result</text>
</svg>
