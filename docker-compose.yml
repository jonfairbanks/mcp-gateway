version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mcp_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp_gateway"]
      interval: 5s
      timeout: 5s
      retries: 20

  gateway:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mcp_gateway
    ports:
      - "8080:8080"
    command: ["mcp-gateway", "serve", "--config", "/app/config.example.yaml"]

volumes:
  pgdata:
