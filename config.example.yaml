gateway:
  listen_host: "0.0.0.0"
  listen_port: 8080
  auth_mode: "single_shared"
  api_key: "${MCP_GATEWAY_API_KEY}"
  bootstrap_admin_api_key: "${MCP_GATEWAY_BOOTSTRAP_ADMIN_API_KEY}"
  allow_unauthenticated: false
  public_tools_catalog: false
  public_metrics: false

logging:
  stdout_json: true

cache:
  enabled: true
  allowed_tools: []
  globally_shareable_tools: []

upstreams:
  ############
  # Context7 #
  ############

  - id: "context7"
    name: "Context7 MCP"
    transport: "stdio"
    command: "npx"
    args:
      - "-y"
      - "@upstash/context7-mcp"
    env: {}
    deny_tools: []
    tool_routes:
      - "context7."

  ###################
  # Chrome DevTools #
  ###################

  - id: "chrome-devtools"
    name: "Chrome DevTools MCP"
    transport: "stdio"
    command: "npx"
    args:
      - "-y"
      - "chrome-devtools-mcp@latest"
      - "--headless"
      - "--no-usage-statistics"
    env: {}
    deny_tools: []

  ###################
  # Endor Labs AURI #
  ###################

  - id: "endor-cli-tools"
    name: "Endor Labs AURI MCP"
    transport: "stdio"
    command: "npx"
    args:
      - "-y"
      - "endorctl"
      - "ai-tools"
      - "mcp-server"
    env: {}
    timeout_ms: 180000
    deny_tools: []
    tool_routes:
      - "endor."

