gateway:
  listen_host: "0.0.0.0"
  listen_port: 8080
  api_key: "change-me"
  rate_limit_per_minute: 120

logging:
  stdout_json: true

cache:
  enabled: true
  max_entries: 10000
  default_ttl_minutes: 60
  client_scoped_tools: []

upstreams:
  - id: "context7"
    name: "context7"
    transport: "stdio"
    command: ["npx", "-y", "@upstash/context7-mcp"]
    env: {}
    deny_tools: []
    tool_routes:
      - "context7."

  - id: "endor-cli-tools"
    name: "endor-cli-tools"
    transport: "stdio"
    command: ["npx", "-y", "endorctl", "ai-tools", "mcp-server"]
    env: {}
    timeout_ms: 180000
    deny_tools: []
    tool_routes:
      - "endor."

  - id: "notion"
    name: "notion"
    transport: "stdio"
    command: ["npx", "-y", "@notionhq/notion-mcp-server"]
    env:
      NOTION_TOKEN: "ntn_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    deny_tools:
      - "API-post-page"
      - "API-patch-page"
    tool_routes:
      - "notion."

  - id: "aws-mcp"
    name: "aws-mcp"
    transport: "stdio"
    command: "uvx"
    args:
      - "mcp-proxy-for-aws@latest"
      - "https://aws-mcp.us-east-1.api.aws/mcp"
      - "--metadata"
      - "AWS_REGION=us-east-1"
    env: {}
    deny_tools: []
    tool_routes:
      - "aws."
